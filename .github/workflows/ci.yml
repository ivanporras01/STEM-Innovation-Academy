# Fail fast on build errors before Vercel deploys (Git push → Vercel follows merge).
# Local equivalent: npm run verify:release
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: npm ci + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js (verify:release)
        run: npm run verify:release
        env:
          DATABASE_URL: "file:./ci.db"
          AUTH_SECRET: "ci-build-secret-minimum-32-characters"
          NEXTAUTH_URL: "http://localhost:3000"
